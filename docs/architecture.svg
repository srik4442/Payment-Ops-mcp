<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" width="920" height="500">
  <defs>
    <!-- Motion paths (invisible) -->
    <path id="p-claude-mcp"  d="M178,242 L297,242"/>
    <path id="p-mcp-stripe"  d="M602,178 L737,148"/>
    <path id="p-mcp-db"      d="M602,308 L737,348"/>
    <path id="p-stripe-mcp"  d="M737,158 L602,192"/>
    <path id="p-db-mcp"      d="M737,358 L602,318"/>
    <path id="p-mcp-claude"  d="M297,252 L178,252"/>

    <!-- Glow filters -->
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="mcp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="claude-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#13104a"/>
    </linearGradient>
    <linearGradient id="stripe-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#140228"/>
    </linearGradient>
    <linearGradient id="db-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#042f2e"/>
      <stop offset="100%" style="stop-color:#021a19"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arr-indigo" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="arr-violet" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
  </defs>

  <!-- ── Background ───────────────────────────────────────────────────── -->
  <rect width="920" height="500" fill="url(#bg-grad)" rx="16"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="100" x2="920" y2="100"/>
    <line x1="0" y1="200" x2="920" y2="200"/>
    <line x1="0" y1="300" x2="920" y2="300"/>
    <line x1="0" y1="400" x2="920" y2="400"/>
    <line x1="230" y1="0" x2="230" y2="500"/>
    <line x1="460" y1="0" x2="460" y2="500"/>
    <line x1="690" y1="0" x2="690" y2="500"/>
  </g>

  <!-- ── Title ─────────────────────────────────────────────────────────── -->
  <text x="460" y="38" text-anchor="middle" fill="#475569" font-family="monospace" font-size="12" letter-spacing="2">PAYMENT OPS MCP SERVER — LIVE ARCHITECTURE</text>

  <!-- ── Connection lines ──────────────────────────────────────────────── -->

  <!-- Claude → MCP -->
  <line x1="178" y1="242" x2="297" y2="242"
        stroke="#6366f1" stroke-width="2" stroke-dasharray="6 3"
        marker-end="url(#arr-indigo)" opacity="0.7"/>
  <!-- MCP → Claude (response) -->
  <line x1="297" y1="252" x2="178" y2="252"
        stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4 4"
        marker-end="url(#arr-indigo)" opacity="0.4"/>

  <!-- MCP → Stripe -->
  <line x1="602" y1="178" x2="737" y2="148"
        stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 3"
        marker-end="url(#arr-violet)" opacity="0.7"/>
  <!-- Stripe → MCP (response) -->
  <line x1="737" y1="158" x2="602" y2="192"
        stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 4"
        marker-end="url(#arr-violet)" opacity="0.4"/>

  <!-- MCP → DB -->
  <line x1="602" y1="308" x2="737" y2="348"
        stroke="#10b981" stroke-width="2" stroke-dasharray="6 3"
        marker-end="url(#arr-green)" opacity="0.7"/>
  <!-- DB → MCP (response) -->
  <line x1="737" y1="358" x2="602" y2="318"
        stroke="#059669" stroke-width="1.5" stroke-dasharray="4 4"
        marker-end="url(#arr-green)" opacity="0.4"/>

  <!-- Connection labels -->
  <text x="237" y="228" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="9" opacity="0.9">JSON-RPC · stdio</text>
  <text x="672" y="150" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="9" transform="rotate(-10,672,150)" opacity="0.9">Stripe SDK</text>
  <text x="672" y="350" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="9" transform="rotate(10,672,350)" opacity="0.9">SQLAlchemy</text>

  <!-- ── Animated dots ──────────────────────────────────────────────────── -->

  <!-- Claude → MCP (indigo dots) -->
  <circle r="5" fill="#818cf8" filter="url(#glow-purple)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0s"><mpath href="#p-claude-mcp"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle r="4" fill="#a5b4fc" filter="url(#glow-purple)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.6s"><mpath href="#p-claude-mcp"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle r="3" fill="#c7d2fe">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="1.2s"><mpath href="#p-claude-mcp"/></animateMotion>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="1.8s" repeatCount="indefinite" begin="1.2s"/>
  </circle>

  <!-- MCP → Claude response (dim) -->
  <circle r="3.5" fill="#6366f1">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.9s"><mpath href="#p-mcp-claude"/></animateMotion>
    <animate attributeName="opacity" values="0;0.6;0.6;0" dur="2s" repeatCount="indefinite" begin="0.9s"/>
  </circle>

  <!-- MCP → Stripe (violet dots) -->
  <circle r="5" fill="#a78bfa" filter="url(#glow-purple)">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.3s"><mpath href="#p-mcp-stripe"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle r="4" fill="#c4b5fd">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.9s"><mpath href="#p-mcp-stripe"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.9s"/>
  </circle>

  <!-- Stripe → MCP response -->
  <circle r="4" fill="#7c3aed">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.6s"><mpath href="#p-stripe-mcp"/></animateMotion>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
  </circle>

  <!-- MCP → DB (green dots) -->
  <circle r="5" fill="#34d399" filter="url(#glow-green)">
    <animateMotion dur="1.6s" repeatCount="indefinite" begin="0.15s"><mpath href="#p-mcp-db"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" repeatCount="indefinite" begin="0.15s"/>
  </circle>
  <circle r="4" fill="#6ee7b7">
    <animateMotion dur="1.6s" repeatCount="indefinite" begin="0.75s"><mpath href="#p-mcp-db"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" repeatCount="indefinite" begin="0.75s"/>
  </circle>

  <!-- DB → MCP response -->
  <circle r="4" fill="#059669">
    <animateMotion dur="1.6s" repeatCount="indefinite" begin="0.5s"><mpath href="#p-db-mcp"/></animateMotion>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="1.6s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- ── CLAUDE DESKTOP BOX ─────────────────────────────────────────────── -->
  <g filter="url(#glow-blue)">
    <rect x="20" y="192" width="158" height="100" rx="12" fill="url(#claude-grad)" stroke="#6366f1" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="99" y="222" text-anchor="middle" font-size="24">🖥️</text>
  <text x="99" y="247" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="12" font-weight="bold">Claude Desktop</text>
  <text x="99" y="264" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="9">AI Client</text>
  <text x="99" y="280" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">types natural language</text>

  <!-- ── MCP SERVER (CENTER, BIG) ───────────────────────────────────────── -->
  <rect x="297" y="90" width="305" height="320" rx="14" fill="url(#mcp-grad)" stroke="#334155" stroke-width="2"/>
  <!-- Pulsing outer ring -->
  <rect x="297" y="90" width="305" height="320" rx="14" fill="none" stroke="#6366f1" stroke-width="1">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Header badge -->
  <rect x="320" y="105" width="260" height="28" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="450" y="123" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10" font-weight="bold" letter-spacing="1">⚙️  THE ORCHESTRATOR</text>

  <!-- MCP Layer block -->
  <rect x="312" y="143" width="275" height="72" rx="8" fill="#0f172a" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="312" y="143" width="275" height="72" rx="8" fill="none" stroke="#818cf8" stroke-width="1">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="330" y="165" fill="#818cf8" font-family="monospace" font-size="10" font-weight="bold">🔌 MCP Layer</text>
  <text x="330" y="181" fill="#64748b" font-family="monospace" font-size="9">mcp_server.py</text>
  <text x="330" y="196" fill="#475569" font-family="monospace" font-size="8">7 tools · 2 resources · 2 prompts</text>
  <text x="550" y="181" text-anchor="middle" fill="#4f46e5" font-family="monospace" font-size="18">🔌</text>

  <!-- Service Layer block -->
  <rect x="312" y="225" width="275" height="72" rx="8" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="312" y="225" width="275" height="72" rx="8" fill="none" stroke="#a78bfa" stroke-width="1">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
  </rect>
  <text x="330" y="247" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold">🧠 Service Layer</text>
  <text x="330" y="263" fill="#64748b" font-family="monospace" font-size="9">payment_service.py</text>
  <text x="330" y="278" fill="#475569" font-family="monospace" font-size="8">90-day rule · human-in-the-loop gate</text>
  <text x="550" y="263" text-anchor="middle" fill="#7c3aed" font-family="monospace" font-size="18">🧠</text>

  <!-- Integration Layer block -->
  <rect x="312" y="307" width="275" height="72" rx="8" fill="#0f172a" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="312" y="307" width="275" height="72" rx="8" fill="none" stroke="#38bdf8" stroke-width="1">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
  </rect>
  <text x="330" y="329" fill="#38bdf8" font-family="monospace" font-size="10" font-weight="bold">🔗 Integration Layer</text>
  <text x="330" y="345" fill="#64748b" font-family="monospace" font-size="9">stripe_client.py · database.py</text>
  <text x="330" y="360" fill="#475569" font-family="monospace" font-size="8">Stripe SDK · SQLAlchemy ORM</text>
  <text x="550" y="345" text-anchor="middle" fill="#0891b2" font-family="monospace" font-size="18">🔗</text>

  <!-- Safety banner inside MCP box -->
  <rect x="312" y="389" width="275" height="10" rx="4" fill="#1a0a0a" stroke="#991b1b" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="397" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="7">🔒 confirm required before money moves</text>

  <!-- ── STRIPE BOX ────────────────────────────────────────────────────── -->
  <g filter="url(#glow-purple)">
    <rect x="737" y="88" width="168" height="122" rx="12" fill="url(#stripe-grad)" stroke="#7c3aed" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
  </g>
  <text x="821" y="124" text-anchor="middle" font-size="26">💳</text>
  <text x="821" y="150" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="12" font-weight="bold">Stripe API</text>
  <text x="821" y="168" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="9">TEST MODE only</text>
  <text x="821" y="183" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">PaymentIntents · Refunds</text>
  <!-- "live" indicator -->
  <circle cx="748" cy="100" r="4" fill="#10b981">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="756" y="104" fill="#10b981" font-family="monospace" font-size="8">live</text>

  <!-- ── ORDERS DB BOX ──────────────────────────────────────────────────── -->
  <g filter="url(#glow-green)">
    <rect x="737" y="298" width="168" height="128" rx="12" fill="url(#db-grad)" stroke="#059669" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
  </g>
  <text x="821" y="336" text-anchor="middle" font-size="26">🗄️</text>
  <text x="821" y="362" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="12" font-weight="bold">Orders DB</text>
  <text x="821" y="380" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="9">customers · orders</text>
  <text x="821" y="396" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="8">refund_log ✓ audit trail</text>
  <text x="821" y="412" text-anchor="middle" fill="#475569" font-family="monospace" font-size="8">SQLite / Postgres</text>
  <!-- "synced" indicator -->
  <circle cx="748" cy="310" r="4" fill="#34d399">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <text x="756" y="314" fill="#34d399" font-family="monospace" font-size="8">synced</text>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <text x="460" y="475" text-anchor="middle" fill="#1e293b" font-family="monospace" font-size="10">Python · MCP SDK · Stripe API (TEST MODE) · SQLAlchemy · pytest</text>

</svg>
